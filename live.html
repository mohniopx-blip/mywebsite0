<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIP Premium - Fixed Layout Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');

        body, html {
            margin: 0; padding: 0;
            height: 100%;
            background-color: #000;
            color: #fff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Fixed Video Container - Yeh kabhi nahi hilega */
        .video-fixed-top {
            width: 100%;
            height: 48vh; /* Fixed height for video */
            position: relative;
            background: #000;
            flex-shrink: 0; /* Prevents shrinking when chat grows */
            z-index: 10;
        }

        #mainVideo {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .blur-overlay {
            filter: blur(50px) brightness(0.3);
            transform: scale(1.1);
        }

        /* Floating HUD elements */
        .live-label {
            background: #ff0000;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 900;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .hud-pill {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 5px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .countdown-pill {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            padding: 4px 10px;
            border-radius: 6px;
            color: #ef4444;
            font-size: 11px;
            font-weight: 800;
        }

        /* Chat Section - Only this will scroll */
        .chat-section {
            flex: 1; /* Occupies remaining space */
            background: #000;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .chat-header {
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        #chatBox {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            scrollbar-width: none;
        }

        .message-card {
            display: flex;
            gap: 12px;
            animation: popMsg 0.3s ease-out forwards;
        }

        @keyframes popMsg {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .avatar {
            width: 32px;
            height: 32px;
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 800;
            flex-shrink: 0;
        }

        /* Bottom Input */
        .input-area {
            padding: 12px 15px;
            background: #000;
            display: flex;
            gap: 10px;
            align-items: center;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .styled-input {
            flex: 1;
            background: #111;
            border-radius: 20px;
            padding: 10px 18px;
            font-size: 14px;
            border: 1px solid rgba(255,255,255,0.05);
            outline: none;
            color: #fff;
        }

        .send-btn {
            width: 42px;
            height: 42px;
            background: #fbbf24;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            flex-shrink: 0;
        }

        /* Reaction floating icons */
        .reaction {
            position: absolute;
            bottom: 30px;
            right: 20px;
            font-size: 22px;
            pointer-events: none;
            animation: floatUp 1.2s ease-out forwards;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.5); opacity: 0; }
            30% { opacity: 1; }
            100% { transform: translateY(-180px) scale(1.6); opacity: 0; }
        }

        /* Unlock Modal */
        #vipModal {
            position: fixed; inset: 0; z-index: 100;
            background: rgba(0,0,0,0.96);
            backdrop-filter: blur(30px);
            display: none; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <!-- Fixed Video Top -->
    <div class="video-fixed-top" id="videoLayer">
        <video id="mainVideo" loop playsinline muted src="myvideo1.mp4"></video>
        
        <!-- HUD overlays -->
        <div class="absolute top-4 left-4 right-4 flex justify-between items-start z-20">
            <div class="flex items-center gap-2">
                <div class="live-label">
                    <div class="w-1.5 h-1.5 bg-white rounded-full animate-pulse"></div>
                    LIVE
                </div>
                <div class="hud-pill">
                    <i data-lucide="eye" class="w-3.5 h-3.5 text-gray-400"></i>
                    <span id="vCount">40</span>
                </div>
            </div>
            <div id="statusLabel" class="countdown-pill">
                PREVIEW: <span id="timeVal">07</span>S
            </div>
        </div>

        <!-- Speaker Viz -->
        <div class="absolute bottom-4 left-4 flex items-center gap-2 bg-black/40 p-1.5 px-3 rounded-lg backdrop-blur-sm">
            <i data-lucide="volume-2" class="w-3.5 h-3.5 text-amber-500"></i>
            <div class="flex items-end gap-[1.5px] h-2.5">
                <div class="w-0.5 bg-amber-500 rounded-full animate-bounce h-1.5"></div>
                <div class="w-0.5 bg-amber-500 rounded-full animate-bounce h-2.5" style="animation-delay: 0.1s"></div>
                <div class="w-0.5 bg-amber-500 rounded-full animate-bounce h-1" style="animation-delay: 0.2s"></div>
            </div>
        </div>
    </div>

    <!-- Scrollable Chat Section -->
    <div class="chat-section">
        <div class="chat-header">
            <div class="flex items-center gap-1.5">
                <div class="w-1.5 h-1.5 bg-green-500 rounded-full shadow-[0_0_8px_#22c55e]"></div>
                <span class="text-[10px] font-bold text-white/40 uppercase tracking-widest">Crystal Audio Chat</span>
            </div>
            <div class="flex gap-4">
                <button onclick="popEmoji('❤️')"><i data-lucide="heart" class="w-4 h-4 text-red-500 fill-red-500"></i></button>
                <button onclick="popEmoji('💎')"><i data-lucide="gem" class="w-4 h-4 text-blue-400 fill-blue-400"></i></button>
            </div>
        </div>

        <div id="chatBox">
            <!-- Initial messages will load here -->
        </div>

        <div class="input-area">
            <i data-lucide="mic" class="w-5 h-5 text-amber-500"></i>
            <input type="text" id="userInput" placeholder="Kaho kuch..." class="styled-input" onkeypress="if(event.key==='Enter') manualSend()">
            <button onclick="manualSend()" class="send-btn">
                <i data-lucide="arrow-up" class="w-5 h-5"></i>
            </button>
        </div>
    </div>

    <!-- Unlock Modal -->
    <div id="vipModal">
        <div class="w-full max-w-[280px] text-center p-6">
            <h2 class="text-xl font-black text-white mb-1 italic">PREVIEW ENDED</h2>
            <p class="text-white/30 text-[9px] uppercase tracking-[2px] mb-6">Enter VIP Token to continue</p>
            <input type="text" id="tokenInp" placeholder="TOKEN" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl text-center text-2xl font-bold text-amber-500 mb-5 outline-none">
            <button onclick="verify()" class="w-full bg-white text-black font-black py-4 rounded-2xl uppercase tracking-widest text-xs">Unlock Stream</button>
        </div>
    </div>

    <script>
        let timeLeft = 7;
        let isRunning = true;
        let dbIndex = 0;

        const db = [
            { n: "Rahul_VIP", m: "sexy rand 🔥", c: "text-amber-400" },
            { n: "fuck_Premium", m: " baby chut dikhao ab 💎", c: "text-blue-400" },
            { n: "Arjun", m: "hey chut me kya dala hua h 😍", c: "text-green-400" },
            { n: "xxam", m: "i live u baby ❤️", c: "text-red-400" },
            { n: "Vikram_Pro", m: "sali gand chatunga ab teri mai ", c: "text-purple-400" },
            { n: "Rahul_VIP", m: "hey bubu to dikhao🔥", c: "text-pink-400" },
            { n: "User", m: "Experience is super smooth", c: "text-cyan-400" },
            { n: "Rahul_VIP", m: "chut ke darshan karwao ab 🥳😝! ❤️", c: "text-orange-400" }
        ];

        window.onload = () => {
            // CHECK: agar pehle hi lock ho chuka hai
if(localStorage.getItem("vipLocked") === "true"){
    lock();
}
            const v = document.getElementById('mainVideo');
            v.play().catch(() => { document.body.onclick = () => v.play(); });

            // 1. INSTANT LOAD: Load 5 messages right away
            for(let i=0; i<5; i++) {
                postMsg(db[i].n, db[i].m, db[i].c);
                dbIndex++;
            }

            // 2. START LOGIC
            startTimer();
            startChatLoop();
            
            // Viewer count fluctuate
            setInterval(() => {
                if(isRunning) document.getElementById('vCount').innerText = 40 + Math.floor(Math.random() * 5);
            }, 3500);
        };

        function startTimer() {
            const t = setInterval(() => {
                if(timeLeft > 0) {
                    timeLeft--;
                    document.getElementById('timeVal').innerText = "0" + timeLeft;
                } else {
                    clearInterval(t);
                    lock();
                }
            }, 1000);
        }

        function startChatLoop() {
            // New message every 4 seconds
            setInterval(() => {
                if(!isRunning) return;
                const data = db[dbIndex];
                postMsg(data.n, data.m, data.c);
                dbIndex = (dbIndex + 1) % db.length;
            }, 4000);
        }

        function postMsg(user, text, color, isSelf = false) {
            const box = document.getElementById('chatBox');
            const el = document.createElement('div');
            el.className = 'message-card';
            el.innerHTML = `
                <div class="avatar">${user.charAt(0)}</div>
                <div>
                    <div class="text-[11px] font-black uppercase ${isSelf ? 'text-amber-500' : color}">${user}</div>
                    <div class="text-[14px] text-white/90 font-medium leading-tight">${text}</div>
                </div>
            `;
            box.appendChild(el);
            box.scrollTop = box.scrollHeight;
        }

        function manualSend() {
            const inp = document.getElementById('userInput');
            if(inp.value.trim()) {
                postMsg("Me", inp.value, "", true);
                inp.value = "";
                popEmoji('❤️');
            }
        }

        function popEmoji(emoji) {
            const e = document.createElement('div');
            e.className = 'reaction';
            e.innerText = emoji;
            e.style.right = (15 + Math.random() * 30) + 'px';
            document.getElementById('videoLayer').appendChild(e);
            setTimeout(() => e.remove(), 1200);
        }

        function lock() {
            localStorage.setItem("vipLocked", "true");
            isRunning = false;
            const v = document.getElementById('mainVideo');
            v.pause();
            v.classList.add('blur-overlay');
            document.getElementById('vipModal').style.display = 'flex';
        }

        function verify() {
            if(document.getElementById('tokenInp').value.toUpperCase() === "VIP786") {
                document.getElementById('vipModal').style.display = 'none';
                const v = document.getElementById('mainVideo');
                v.classList.remove('blur-overlay');
                v.play();
                const s = document.getElementById('statusLabel');
                s.innerText = "VIP UNLOCKED";
                s.style.color = "#22c55e";
                s.style.background = "rgba(34, 197, 94, 0.15)";
                s.style.borderColor = "rgba(34, 197, 94, 0.3)";
                isRunning = true;
                timeLeft = 9999;
            }
        }

        lucide.createIcons();
    </script>
</body>
</html>
