<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Online Service</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:linear-gradient(#0b0b1a,#140f2d);
color:white;
}

/* 🔥 TOUCH FIX */
*{
-webkit-tap-highlight-color: transparent;
}

button, .box, .card{
cursor:pointer;
transition: all 0.15s ease;
}

/* 🔥 CLICK EFFECT */
button:active, .box:active, .card:active{
transform: scale(0.95);
opacity:0.7;
}

button:hover{
box-shadow:0 0 10px rgba(255,0,255,0.6);
}

.header{
padding:15px;
font-size:20px;
}

.hero img{
width:100%;
height:auto;
}

.boxes{
display:flex;
gap:10px;
padding:15px;
}

.box{
flex:1;
background:#1c1c2e;
padding:20px;
border-radius:15px;
text-align:center;
}

/* CHAT */
.chat-section{
padding:15px;
}

.video-btn{
background: linear-gradient(45deg,#ff00cc,#3333ff);
border:none;
padding:12px 25px;
border-radius:30px;
color:white;
font-size:16px;
display:inline-flex;
align-items:center;
gap:8px;
margin-bottom:10px;
}

.chat-box{
background: linear-gradient(180deg,#1a1a2e,#0f3460);
padding:15px;
height:200px;
border-radius:15px;
overflow-y:auto;
margin-bottom:10px;
}

.message{
background:#16213e;
padding:8px 12px;
border-radius:10px;
margin-top:5px;
width:fit-content;
}

.chat-input{
display:flex;
gap:10px;
}

.chat-input input{
flex:1;
padding:10px;
border-radius:10px;
border:none;
outline:none;
}

.chat-input button{
padding:10px 15px;
border-radius:20px;
border:none;
background:linear-gradient(45deg,purple,blue);
color:white;
}

/* Gallery */
.gallery-btn{
border-radius:50%;
background:linear-gradient(45deg,#ff7b00,#ff00cc);
}

/* SERVICES */
.services{
padding:15px;
}

.card{
background:#1c1c2e;
padding:15px;
margin-top:10px;
border-radius:15px;
display:flex;
justify-content:space-between;
}

.btn{
background:linear-gradient(45deg,purple,blue);
border:none;
padding:10px 20px;
border-radius:20px;
color:white;
}

/* QR */
#qr{
display:none;
text-align:center;
padding:15px;
}

/* PROOFS */
#proofSection{
display:none;
padding:15px;
}

#proofSection img{
width:100%;
margin-top:10px;
border-radius:10px;
}
</style>
</head>

<body>

<div class="header">❤️ ONLINE SERVICE</div>

<div class="hero">
<img src="myphoto.jpg">
</div>

<div class="boxes">
<div class="box" onclick="showProofs()">Past Proofs</div>
<div class="box">Live Chat</div>
</div>

<!-- CHAT -->
<div class="chat-section">
<h2>Live Chat</h2>

<button class="video-btn" onclick="videoCall()">📹 Video Call</button>

<div id="chatBox" class="chat-box"></div>

<div class="chat-input">
<input id="msg" placeholder="Type message...">
<button class="gallery-btn" onclick="galleryClick()">📷</button>
<button onclick="sendMsg()">Send</button>
</div>
</div>

<!-- SERVICES -->
<div class="services">

<div class="card" onclick="selectService(200)">
15 min private cam ₹200
<button class="btn">BOOK</button>
</div>

<div class="card" onclick="selectService(300)">
30 min private cam ₹300
<button class="btn">BOOK</button>
</div>

<div class="card" onclick="selectService(200)">
20 min voice call ₹200
<button class="btn">BOOK</button>
</div>

<div class="card" onclick="selectService(300)">
1 hour voice call ₹300
<button class="btn">BOOK</button>
</div>

<div class="card" onclick="selectService(100)">
30 min chat ₹100
<button class="btn">BOOK</button>
</div>

<div class="card" onclick="selectService(200)">
1 hour chat ₹200
<button class="btn">BOOK</button>
</div>

</div>

<!-- PAYMENT -->
<div style="padding:15px;">
<p id="price">Selected Price: ₹0</p>

<input id="coupon" placeholder="Enter coupon code">
<button class="btn" onclick="applyCoupon()">Apply</button>

<br><br>
<button class="btn" onclick="showQR()">Proceed to Pay</button>
</div>

<div id="qr">
<h2>Scan & Pay</h2>
<img src="qr.png" width="200">
<br><br>
<button class="btn" onclick="paid()">I Have Paid</button>
</div>

<!-- PROOFS -->
<div id="proofSection">
<h2>Proofs</h2>
<img src="img1.jpg">
<img src="img2.jpg">
<img src="img3.jpg">
<img src="img4.jpg">
<img src="img5.jpg">
<img src="img6.jpg">
</div>

<script>
let price = 0;

function selectService(p){
price=p;
document.getElementById("price").innerText="Selected Price: ₹"+p;
}

function applyCoupon(){
let code=document.getElementById("coupon").value;

if(code.toLowerCase()=="firsttime"){
price=50;
document.getElementById("price").innerText="Discount Price: ₹100";
}else{
alert("Invalid Coupon");
}
}

function showQR(){
if(price==0){
alert("Select service first");
return;
}
document.getElementById("qr").style.display="block";
}

/* CHAT */
function sendMsg(){
let msg=document.getElementById("msg").value;
if(msg=="") return;

let box=document.getElementById("chatBox");

let div=document.createElement("div");
div.className="message";
div.innerText=msg;

box.appendChild(div);
document.getElementById("msg").value="";
box.scrollTop=box.scrollHeight;
}

/* DUMMY FEATURES */
function videoCall(){
alert("Make payment first");
}

function galleryClick(){
alert("Make payment first");
}

/* PROOFS */
function showProofs(){
document.getElementById("proofSection").style.display="block";
}

/* PAYMENT */
function paid(){
alert("Payment received! We will contact you soon.");
}
</script>

</body>
  </html>
