<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Private Chat</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:linear-gradient(#0b0b1a,#140f2d);
color:white;
text-align:center;
}

.container{
padding:40px 20px;
}

h1{
margin-top:40px;
font-size:28px;
}

/* Button Style */
.btn{
background:linear-gradient(45deg,purple,blue);
border:none;
padding:15px 25px;
border-radius:30px;
color:white;
font-size:16px;
cursor:pointer;
transition:0.2s;
margin-top:20px;
}

.btn:active{
transform:scale(0.92);
opacity:0.7;
}

.btn:hover{
opacity:0.9;
}

#userInfo{
margin-top:25px;
font-size:18px;
background:#1c1c2e;
padding:15px;
border-radius:15px;
display:none;
}
</style>
</head>

<body>

<div class="container">

<h1>🔐 Private Chat</h1>

<button class="btn" onclick="login()">Login with Google</button>

<div id="userInfo"></div>

</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCn9bgrZxcaH3DF2CAYuLq7FT0nM0JFwjY",
  authDomain: "mychat-9eb7c.firebaseapp.com",
  projectId: "mychat-9eb7c"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

window.login = function(){
  signInWithPopup(auth, provider)
  .then((result)=>{
    let user = result.user;

    let box = document.getElementById("userInfo");
    box.style.display="block";

    box.innerHTML = `
      ✅ Logged in successfully <br><br>
      👤 <b>${user.displayName}</b><br>
      📧 ${user.email}
    `;
  })
  .catch((error)=>{
    alert("Login failed ❌");
    console.log(error);
  });
}
</script>

</body>
</html>
