<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIP Premium - Fixed & Clean</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #0d0915; 
            color: white; 
            margin: 0; 
            padding: 0; 
            overflow-x: hidden; 
            -webkit-tap-highlight-color: transparent; 
        }

        .glass { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(16px); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
        }

        .premium-popup-box {
            background: #120c1c;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.9);
            z-index: 1100;
        }

        button:active { transform: scale(0.96); opacity: 0.8; }
        
        @keyframes modalShow {
            from { transform: scale(0.9) translateY(20px); opacity: 0; }
            to { transform: scale(1) translateY(0); opacity: 1; }
        }
        .animate-modal { animation: modalShow 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }

        .hidden { display: none !important; }
        
        /* Ensure popup is always clickable */
        #customPopUp {
            pointer-events: auto;
        }
    </style>
</head>
<body>

    <div class="max-w-md mx-auto min-h-screen bg-[#0d0915] flex flex-col relative pb-10">
        <!-- Header -->
        <header class="p-5 flex items-center justify-between sticky top-0 bg-[#0d0915]/95 backdrop-blur-xl z-[100] border-b border-white/5">
            <div class="flex items-center gap-3">
                <button id="backBtn" class="p-2 bg-white/5 rounded-full hidden" onclick="goHome()">
                    <i data-lucide="chevron-left" class="w-5 h-5 text-purple-400"></i>
                </button>
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-gradient-to-tr from-purple-600 to-pink-500 rounded-lg flex items-center justify-center">
                        <i data-lucide="crown" class="w-4 h-4 text-white"></i>
                    </div>
                    <span class="font-black text-[10px] tracking-[0.2em] uppercase opacity-70">VIP PREMIUM</span>
                </div>
            </div>
            <button id="adminTrigger" class="p-2 opacity-5"><i data-lucide="settings" class="w-5 h-5"></i></button>
        </header>

        <main class="flex-1 p-5">
            <!-- VIEW: HOME -->
            <div id="view-home" class="space-y-8">
                <!-- Video Player -->
                <div class="relative aspect-[3/4] rounded-[3rem] overflow-hidden border border-white/10 shadow-2xl">
                    <video id="mainVideo" autoplay muted loop playsinline class="w-full h-full object-cover">
                        <source src="myvideo.mp4" type="video/mp4">
                    </video>
                    <button onclick="toggleMute()" class="absolute top-6 right-6 bg-black/40 backdrop-blur-md p-3 rounded-full border border-white/10 z-10">
                        <i id="muteIcon" data-lucide="volume-x" class="w-5 h-5 text-white"></i>
                    </button>
                    <div class="absolute inset-x-0 bottom-0 h-1/2 bg-gradient-to-t from-[#0d0915] to-transparent"></div>
                    <div class="absolute bottom-8 left-8">
                        <h2 class="text-3xl font-black italic uppercase leading-none tracking-tighter">EXCLUSIVE<br><span class="text-purple-500 text-5xl">GIRLS</span></h2>
                    </div>
                </div>

                <!-- Proofs & Photos Buttons -->
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="showView('proofs')" class="glass py-8 rounded-[2.5rem] flex flex-col items-center gap-2">
                        <i data-lucide="verified" class="w-7 h-7 text-pink-500 mb-1"></i>
                        <span class="text-[10px] font-black uppercase tracking-widest text-white/50">Live Proofs</span>
                    </button>
                    <button onclick="showView('myphotos')" class="glass py-8 rounded-[2.5rem] flex flex-col items-center gap-2">
                        <i data-lucide="camera" class="w-7 h-7 text-blue-500 mb-1"></i>
                        <span class="text-[10px] font-black uppercase tracking-widest text-white/50">My Photos</span>
                    </button>
                </div>

                <!-- Services List -->
                <div class="space-y-4">
                    <p class="text-[11px] font-black text-white/30 uppercase tracking-[0.3em] ml-4">Available Services</p>
                    <div id="servicesList" class="space-y-4"></div>
                </div>
            </div>

            <!-- VIEW: PROOFS -->
            <div id="view-proofs" class="hidden space-y-6 animate-modal">
                <div id="videoProofsList" class="space-y-4"></div>
                <div id="imageProofsList" class="grid grid-cols-1 gap-4"></div>
            </div>

            <!-- VIEW: PHOTOS -->
            <div id="view-myphotos" class="hidden grid grid-cols-2 gap-3 animate-modal"></div>

            <!-- VIEW: BOOKING -->
            <div id="view-booking" class="hidden space-y-6 animate-modal">
                <div class="bg-gradient-to-br from-purple-600 to-blue-700 p-12 rounded-[3.5rem] text-center shadow-2xl relative border border-white/20">
                    <h2 id="bookName" class="text-xs font-black uppercase tracking-[0.2em] opacity-60 mb-2">Selected Plan</h2>
                    <p id="bookPrice" class="text-7xl font-black italic tracking-tighter">₹0</p>
                </div>

                <div class="glass p-3 rounded-[2.2rem] flex gap-3">
                    <input id="couponInput" type="text" placeholder="COUPON CODE" class="flex-1 bg-black/40 rounded-2xl px-6 py-5 text-[12px] font-bold outline-none focus:border-purple-500 uppercase tracking-widest">
                    <button onclick="applyCoupon()" class="bg-purple-600 px-8 py-5 rounded-2xl font-black text-[11px] uppercase tracking-wider">Apply</button>
                </div>

                <div class="bg-white rounded-[3.5rem] p-10 flex flex-col items-center">
                    <div class="bg-gray-50 rounded-[2.5rem] p-5 mb-8 w-full max-w-[260px] border-2 border-dashed border-gray-200">
                        <img src="qr.png" onerror="this.src='https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=PAYMENT_VIP'" class="w-full aspect-square object-contain mix-blend-multiply">
                    </div>
                    <!-- Booking Button -->
                    <button onclick="triggerServiceLockPopUp()" class="w-full bg-[#f44b8d] text-white py-6 rounded-2xl font-black uppercase text-sm tracking-widest shadow-xl shadow-pink-500/30">
                        UNBLOCK VIDEO CALL
                    </button>
                </div>
            </div>

            <!-- ADMIN VIEWS (Same as before) -->
            <div id="view-admin" class="hidden space-y-4">
                <div class="flex justify-between items-center mb-6"><h2 class="font-black uppercase italic text-xl text-pink-500">Admin</h2><button onclick="goHome()" class="bg-white/5 p-3 rounded-xl"><i data-lucide="x" class="w-5 h-5"></i></button></div>
                <div id="adminUserList" class="space-y-3"></div>
            </div>
        </main>

        <!-- PREMIUM POP-UP MODAL (FIXED) -->
        <div id="customPopUp" class="fixed inset-0 bg-black/95 z-[2000] hidden items-center justify-center p-8 backdrop-blur-lg">
            <div class="premium-popup-box w-full max-w-[340px] rounded-[3.5rem] p-10 text-center animate-modal">
                <div id="popIconContainer" class="w-20 h-20 mx-auto rounded-full flex items-center justify-center mb-6 bg-purple-500/10 text-purple-500">
                    <i id="popIcon" data-lucide="lock" class="w-10 h-10"></i>
                </div>
                
                <h3 id="popTitle" class="text-white font-black text-2xl uppercase italic tracking-tighter mb-3 leading-tight">SERVICE LOCK</h3>
                <p id="popDesc" class="text-white/40 text-[11px] font-bold uppercase leading-relaxed mb-10 px-2 tracking-wide">MAKE PAYMENT FOR UNLOCK SERVICE</p>
                
                <!-- Fixed Understood Button -->
                <button id="understoodBtn" class="w-full py-5 bg-gradient-to-r from-purple-600 to-pink-500 text-white rounded-[1.8rem] font-black uppercase text-[11px] tracking-[0.2em] shadow-lg shadow-purple-500/20">
                    UNDERSTOOD
                </button>
            </div>
        </div>

        <!-- Hidden Admin Pin Modal -->
        <div id="passwordModal" class="fixed inset-0 bg-black/98 z-[3000] hidden items-center justify-center p-10">
            <div class="premium-popup-box p-10 rounded-[3rem] text-center w-full max-w-[320px]">
                <h3 class="font-black text-white uppercase italic mb-8 tracking-widest text-[10px] opacity-40">ADMIN PIN</h3>
                <input id="adminPassInput" type="password" placeholder="****" class="w-full bg-black/50 border border-white/10 rounded-2xl py-5 text-center text-2xl font-bold text-pink-500 outline-none mb-8">
                <div class="flex gap-3">
                    <button onclick="document.getElementById('passwordModal').classList.add('hidden')" class="flex-1 py-4 bg-white/5 rounded-2xl font-black uppercase text-[10px]">Cancel</button>
                    <button onclick="checkAdminPassword()" class="flex-1 py-4 bg-pink-600 rounded-2xl font-black uppercase text-[10px]">Verify</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCn9bgrZxcaH3DF2CAYuLq7FT0nM0JFwjY",
            authDomain: "mychat-9eb7c.firebaseapp.com",
            databaseURL: "https://mychat-9eb7c-default-rtdb.firebaseio.com",
            projectId: "mychat-9eb7c",
            storageBucket: "mychat-9eb7c.firebasestorage.app",
            messagingSenderId: "726638251919",
            appId: "1:726638251919:web:c2c79f9b0e7b554bd485fa"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        let uid;

        // Feedback
        const haptic = () => { if(navigator.vibrate) navigator.vibrate(20); };

        // PopUp Control
        window.showPopUp = (icon, title, desc, colorClass) => {
            haptic();
            const iconEl = document.getElementById('popIcon');
            const cont = document.getElementById('popIconContainer');
            
            iconEl.setAttribute('data-lucide', icon);
            cont.className = `w-20 h-20 mx-auto rounded-full flex items-center justify-center mb-6 ${colorClass}`;
            
            document.getElementById('popTitle').innerText = title;
            document.getElementById('popDesc').innerText = desc;
            document.getElementById('customPopUp').classList.replace('hidden', 'flex');
            lucide.createIcons();
        };

        window.hidePopUp = () => {
            haptic();
            document.getElementById('customPopUp').classList.replace('flex', 'hidden');
        };

        // Attach event listener directly to button to ensure it works
        document.getElementById('understoodBtn').addEventListener('click', hidePopUp);

        window.triggerServiceLockPopUp = () => {
            showPopUp('lock', 'SERVICE LOCK', 'MAKE PAYMENT FOR UNLOCK SERVICE', 'bg-red-500/20 text-red-500');
        };

        window.applyCoupon = () => {
            const val = document.getElementById('couponInput').value.trim().toLowerCase();
            if(val === 'first time') {
                document.getElementById('bookPrice').innerText = '₹100';
                showPopUp('check-circle', 'OFFER APPLIED!', 'FIRST TIME OFFER ACTIVATED! TOTAL PRICE UPDATED TO ₹100 ONLY', 'bg-green-500/20 text-green-500');
            } else {
                showPopUp('alert-circle', 'INVALID CODE', 'USE CODE "first time" FOR 100rs SPECIAL DISCOUNT', 'bg-red-500/20 text-red-500');
            }
        };

        // Views
        window.showView = (id) => {
            haptic();
            ['home','proofs','myphotos','booking','admin'].forEach(v => {
                const el = document.getElementById('view-'+v);
                if(el) el.classList.add('hidden');
            });
            document.getElementById('view-'+id).classList.remove('hidden');
            document.getElementById('backBtn').classList.toggle('hidden', id === 'home');
            window.scrollTo(0,0);
            lucide.createIcons();
        };
        window.goHome = () => showView('home');

        // Admin Secret
        let tap = 0;
        document.getElementById('adminTrigger').onclick = () => {
            tap++;
            if(tap >= 5) { document.getElementById('passwordModal').classList.remove('hidden'); tap = 0; }
        };
        window.checkAdminPassword = () => {
            if(document.getElementById('adminPassInput').value === '9988') {
                document.getElementById('passwordModal').classList.add('hidden');
                showView('admin');
            } else { showPopUp('shield-alert', 'DENIED', 'WRONG ADMIN PIN', 'bg-red-500/20 text-red-500'); }
        };

        // Big Clear Services
        const services = [
            { n: "15 MIN PRIVATE CAM 1 TO 1", p: 200 },
            { n: "30 MIN PRIVATE CAM 1 TO 1", p: 300 },
            { n: "1 HOUR PRIVATE CAM 1 TO 1", p: 500 },
            { n: "30 MIN VOICE CALL", p: 200 },
            { n: "1 HOUR PRIVATE CHAT", p: 200 }
        ];

        const sList = document.getElementById('servicesList');
        services.forEach(s => {
            const d = document.createElement('div');
            d.className = "glass p-10 rounded-[3rem] flex justify-between items-center active:bg-white/10 border border-white/5 transition-all shadow-xl";
            d.onclick = () => {
                document.getElementById('bookName').innerText = s.n;
                document.getElementById('bookPrice').innerText = '₹' + s.p;
                showView('booking');
            };
            d.innerHTML = `
                <div class="flex-1">
                    <p class="text-sm font-black uppercase text-white/80 tracking-widest mb-3">${s.n}</p>
                    <p class="text-5xl font-black text-purple-500 italic tracking-tighter">₹${s.p}</p>
                </div>
                <div class="bg-purple-600 px-6 py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest shadow-lg shadow-purple-500/20">Select</div>
            `;
            sList.appendChild(d);
        });

        // Assets
        const vList = document.getElementById('videoProofsList');
        [1,2,3].forEach(i => {
            vList.innerHTML += `<div class="glass rounded-[3rem] overflow-hidden relative mb-4" onclick="const v=this.querySelector('video'); v.paused?v.play():v.pause();"><video loop playsinline class="w-full aspect-video object-cover"><source src="proof${i}.mp4"></video><div class="absolute inset-0 flex items-center justify-center bg-black/20"><i data-lucide="play" class="w-12 h-12 text-white/30"></i></div></div>`;
        });
        const ipList = document.getElementById('imageProofsList');
        [1,2,3,4,5,6].forEach(i => { ipList.innerHTML += `<img src="img${i}.jpg" onerror="this.style.display='none'" class="w-full rounded-[3rem] glass mb-4 border border-white/10">`; });
        const phList = document.getElementById('view-myphotos');
        for(let i=7; i<=17; i++) { phList.innerHTML += `<img src="img${i}.jpg" onerror="this.style.display='none'" class="w-full rounded-[2.5rem] glass shadow-xl">`; }

        // Mute
        window.toggleMute = () => {
            const v = document.getElementById('mainVideo'); v.muted = !v.muted;
            document.getElementById('muteIcon').setAttribute('data-lucide', v.muted ? 'volume-x' : 'volume-2');
            lucide.createIcons();
        };

        // Init Lucide
        lucide.createIcons();
    </script>
</body>
</html>
