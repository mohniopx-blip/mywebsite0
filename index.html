<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIP Premium Service</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0d0915; color: white; margin: 0; padding: 0; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .hidden { display: none !important; }
        .chat-bubble { max-width: 85%; padding: 12px 16px; border-radius: 20px; font-size: 14px; margin-bottom: 8px; line-height: 1.4; word-wrap: break-word; }
        .sent { background: #7c3aed; align-self: flex-end; border-bottom-right-radius: 4px; color: white; }
        .received { background: #231b2e; align-self: flex-start; border-bottom-left-radius: 4px; color: #d1d1d1; }
        .admin-reply { background: #db2777; align-self: flex-start; border-bottom-left-radius: 4px; color: white; font-weight: 600; }
        .btn-pink { background: #ec4899; box-shadow: 0 8px 20px rgba(236, 72, 153, 0.3); }
    </style>
</head>
<body>

    <div class="max-w-md mx-auto min-h-screen bg-[#0d0915] flex flex-col relative">
        <!-- Header -->
        <header class="p-4 flex items-center justify-between sticky top-0 bg-[#0d0915]/90 backdrop-blur-xl z-50 border-b border-white/5">
            <div class="flex items-center gap-3">
                <button id="backBtn" class="p-2 bg-white/5 rounded-full hidden" onclick="goHome()">
                    <i data-lucide="chevron-left" class="w-5 h-5 text-purple-400"></i>
                </button>
                <div id="logoArea" class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-gradient-to-tr from-purple-600 to-pink-500 rounded-lg flex items-center justify-center">
                        <i data-lucide="crown" class="w-5 h-5 text-white"></i>
                    </div>
                    <span class="font-black text-[11px] tracking-widest uppercase opacity-80">VIP PREMIUM</span>
                </div>
            </div>
            <!-- Admin Hidden Button (5 Clicks) -->
            <button id="adminTrigger" class="p-2 opacity-10"><i data-lucide="settings" class="w-5 h-5"></i></button>
        </header>

        <main class="flex-1 p-4 pb-20">
            <!-- HOME VIEW -->
            <div id="view-home" class="space-y-6">
                <div class="relative h-80 rounded-[2.5rem] overflow-hidden shadow-2xl">
                    <img src="myphoto.jpg" onerror="this.src='https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e?w=800'" class="w-full h-full object-cover">
                    <div class="absolute inset-0 bg-gradient-to-t from-[#0d0915]"></div>
                    <div class="absolute bottom-8 left-8">
                        <div class="flex items-center gap-2 mb-2"><span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span><span class="text-[10px] text-green-400 font-bold uppercase">Online Now</span></div>
                        <h2 class="text-4xl font-black uppercase italic tracking-tighter">PREMIUM<br><span class="text-purple-500 text-5xl">GIRLS</span></h2>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="showView('proofs')" class="glass p-6 rounded-[2rem] flex flex-col items-center gap-2 active:scale-95">
                        <i data-lucide="shield-check" class="w-7 h-7 text-pink-500"></i>
                        <span class="text-[10px] font-black uppercase">Live Proofs</span>
                    </button>
                    <button onclick="showView('chat')" class="glass p-6 rounded-[2rem] flex flex-col items-center gap-2 active:scale-95">
                        <i data-lucide="message-circle" class="w-7 h-7 text-blue-500"></i>
                        <span class="text-[10px] font-black uppercase">Chat Karo</span>
                    </button>
                </div>
                <div class="space-y-4">
                    <p class="text-[10px] font-black text-gray-500 uppercase tracking-widest ml-2">Services</p>
                    <div id="servicesList" class="space-y-3"></div>
                </div>
            </div>

            <!-- PROOFS -->
            <div id="view-proofs" class="hidden space-y-4">
                <div class="grid grid-cols-1 gap-4">
                    <img src="img1.jpg" onerror="this.style.display='none'" class="w-full rounded-[2rem] glass">
                    <img src="img2.jpg" onerror="this.style.display='none'" class="w-full rounded-[2rem] glass">
                    <img src="img3.jpg" onerror="this.style.display='none'" class="w-full rounded-[2rem] glass">
                </div>
            </div>

            <!-- BOOKING -->
            <div id="view-booking" class="hidden space-y-6">
                <div class="bg-gradient-to-br from-purple-700 to-indigo-900 p-8 rounded-[2.5rem]">
                    <h2 id="bookName" class="text-2xl font-black uppercase tracking-tighter leading-tight">...</h2>
                    <p id="bookPrice" class="text-5xl font-black italic mt-4">₹0</p>
                </div>
                <div class="glass p-6 rounded-[2.2rem]">
                    <div class="flex gap-2 mb-2">
                        <input id="couponInput" type="text" placeholder="COUPON CODE" class="flex-1 bg-black/40 border border-white/10 rounded-2xl px-5 py-4 text-xs outline-none focus:border-purple-500 uppercase font-black text-white">
                        <button onclick="applyCoupon()" class="bg-purple-600 px-6 py-4 rounded-2xl font-black text-[10px] uppercase">Apply</button>
                    </div>
                </div>
                <div class="bg-white rounded-[2.5rem] p-8 flex flex-col items-center">
                    <img src="qr.png" onerror="this.src='https://dummyimage.com/300/eee/aaa&text=qr.png'" class="w-56 h-56 object-contain mb-8">
                    <button onclick="document.getElementById('alertBox').classList.replace('hidden','flex')" class="w-full btn-pink text-white py-6 rounded-2xl font-black uppercase text-sm tracking-widest">
                        UNBLOCK VIDEO CALL
                    </button>
                </div>
            </div>

            <!-- CHAT VIEW (User) -->
            <div id="view-chat" class="hidden flex flex-col h-[78vh]">
                <div id="chatMessages" class="flex-1 overflow-y-auto flex flex-col space-y-2 p-2"></div>
                <div class="flex gap-2 p-3 glass rounded-[2rem] mt-2">
                    <input id="chatInput" type="text" placeholder="Message likhein..." class="flex-1 bg-transparent outline-none text-sm font-semibold px-2">
                    <button id="sendBtn" class="bg-purple-600 p-4 rounded-2xl"><i data-lucide="send" class="w-4 h-4"></i></button>
                </div>
            </div>

            <!-- ADMIN VIEW -->
            <div id="view-admin" class="hidden space-y-4">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="font-black uppercase italic text-xl text-pink-500">Admin Dashboard</h2>
                    <button onclick="goHome()" class="text-[10px] font-black uppercase bg-white/10 px-4 py-2 rounded-xl">Exit</button>
                </div>
                <div id="adminUserList" class="space-y-3"></div>
            </div>

            <!-- ADMIN CHAT -->
            <div id="view-admin-chat" class="hidden flex flex-col h-[78vh]">
                <div class="flex items-center gap-4 mb-4">
                    <button onclick="showView('admin')" class="p-2 bg-white/5 rounded-full"><i data-lucide="chevron-left" class="w-4 h-4"></i></button>
                    <span id="activeChatName" class="text-xs font-black uppercase text-pink-400">Reply</span>
                </div>
                <div id="adminMessages" class="flex-1 overflow-y-auto flex flex-col space-y-2 p-2 pt-4"></div>
                <div class="flex gap-2 p-3 glass rounded-[2rem] mt-2 border border-pink-500/30">
                    <input id="adminChatInput" type="text" placeholder="Type reply..." class="flex-1 bg-transparent outline-none text-sm font-semibold px-2">
                    <button id="adminSendBtn" class="bg-pink-600 p-4 rounded-2xl"><i data-lucide="reply" class="w-4 h-4"></i></button>
                </div>
            </div>
        </main>

        <!-- Admin Password Modal -->
        <div id="passwordModal" class="fixed inset-0 bg-black/95 z-[300] hidden items-center justify-center p-10">
            <div class="bg-gray-900 border border-white/10 p-8 rounded-[2rem] text-center w-full max-w-[300px]">
                <h3 class="font-black text-white uppercase italic mb-6">Admin Access</h3>
                <input id="adminPassInput" type="password" placeholder="Enter PIN" class="w-full bg-black border border-white/20 rounded-xl py-4 text-center text-xl font-bold tracking-[1em] outline-none focus:border-pink-500 mb-6">
                <div class="flex gap-2">
                    <button onclick="document.getElementById('passwordModal').classList.add('hidden')" class="flex-1 py-4 bg-white/5 rounded-xl font-black uppercase text-[10px]">Cancel</button>
                    <button onclick="checkAdminPassword()" class="flex-1 py-4 bg-pink-600 rounded-xl font-black uppercase text-[10px]">Login</button>
                </div>
            </div>
        </div>

        <!-- Service Alert -->
        <div id="alertBox" class="fixed inset-0 bg-black/95 z-[200] hidden items-center justify-center p-10">
            <div class="bg-white p-8 rounded-[2.5rem] text-center w-full max-w-[300px]">
                <i data-lucide="lock" class="w-12 h-12 text-red-500 mx-auto mb-4"></i>
                <h3 class="text-gray-900 font-black text-xl uppercase italic">Service Locked</h3>
                <p class="text-gray-500 text-[11px] font-bold uppercase mb-6">Pehle payment karke screen lock kholiye</p>
                <button onclick="this.closest('#alertBox').classList.replace('flex','hidden')" class="w-full py-5 bg-gray-900 text-white rounded-2xl font-black uppercase text-[10px]">OKAY</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, set, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCn9bgrZxcaH3DF2CAYuLq7FT0nM0JFwjY",
            authDomain: "mychat-9eb7c.firebaseapp.com",
            databaseURL: "https://mychat-9eb7c-default-rtdb.firebaseio.com",
            projectId: "mychat-9eb7c",
            storageBucket: "mychat-9eb7c.firebasestorage.app",
            messagingSenderId: "726638251919",
            appId: "1:726638251919:web:c2c79f9b0e7b554bd485fa"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        let currentUserId, activeAdminChat;

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUserId = user.uid;
                update(ref(db, 'active_users/' + user.uid), {
                    id: user.uid,
                    lastSeen: Date.now(),
                    name: 'Client-' + user.uid.slice(-4)
                });
                setupUserChat();
            } else {
                signInAnonymously(auth);
            }
        });

        window.showView = (id) => {
            ['home','proofs','booking','chat','admin','admin-chat'].forEach(v => document.getElementById('view-'+v).classList.add('hidden'));
            document.getElementById('view-'+id).classList.remove('hidden');
            document.getElementById('backBtn').classList.toggle('hidden', id === 'home');
            if(id === 'admin') loadUserList();
            lucide.createIcons();
            window.scrollTo(0,0);
        };

        window.goHome = () => showView('home');

        function setupUserChat() {
            onValue(ref(db, 'chats/' + currentUserId), (snap) => {
                const box = document.getElementById('chatMessages');
                box.innerHTML = '<div class="chat-bubble received">Namaste! Kaise help kar sakte hain?</div>';
                snap.forEach(child => {
                    const m = child.val();
                    const div = document.createElement('div');
                    div.className = `chat-bubble ${m.sender === 'u' ? 'sent' : 'admin-reply'}`;
                    div.innerText = m.text;
                    box.appendChild(div);
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        document.getElementById('sendBtn').onclick = () => {
            const input = document.getElementById('chatInput');
            if(!input.value.trim()) return;
            push(ref(db, 'chats/' + currentUserId), { text: input.value, sender: 'u', timestamp: Date.now() });
            update(ref(db, 'active_users/' + currentUserId), { lastSeen: Date.now() });
            input.value = '';
        };

        // ADMIN PIN LOGIC
        const ADMIN_PIN = "9988"; // Change this if you want
        let clicks = 0;
        document.getElementById('adminTrigger').onclick = () => {
            clicks++;
            if(clicks === 5) {
                document.getElementById('passwordModal').classList.remove('hidden');
                clicks = 0;
            }
            setTimeout(() => clicks = 0, 3000);
        };

        window.checkAdminPassword = () => {
            const val = document.getElementById('adminPassInput').value;
            if(val === ADMIN_PIN) {
                document.getElementById('passwordModal').classList.add('hidden');
                document.getElementById('adminPassInput').value = '';
                showView('admin');
            } else {
                alert("Wrong PIN!");
                document.getElementById('adminPassInput').value = '';
            }
        };

        function loadUserList() {
            onValue(ref(db, 'active_users'), (snap) => {
                const list = document.getElementById('adminUserList');
                list.innerHTML = '';
                snap.forEach(child => {
                    const u = child.val();
                    const div = document.createElement('div');
                    div.className = "glass p-5 rounded-2xl cursor-pointer flex justify-between items-center border border-white/5 active:bg-white/10";
                    div.onclick = () => openAdminChat(u.id);
                    div.innerHTML = `<span class="text-xs font-black uppercase tracking-widest text-white">${u.name}</span><i data-lucide="chevron-right" class="w-4 h-4 text-pink-500"></i>`;
                    list.appendChild(div);
                });
                lucide.createIcons();
            });
        }

        function openAdminChat(uid) {
            activeAdminChat = uid;
            document.getElementById('activeChatName').innerText = 'User-' + uid.slice(-4);
            showView('admin-chat');
            onValue(ref(db, 'chats/' + uid), (snap) => {
                const box = document.getElementById('adminMessages');
                box.innerHTML = '';
                snap.forEach(child => {
                    const m = child.val();
                    const div = document.createElement('div');
                    div.className = `chat-bubble ${m.sender === 'u' ? 'received' : 'sent'}`;
                    div.innerText = m.text;
                    box.appendChild(div);
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        document.getElementById('adminSendBtn').onclick = () => {
            const input = document.getElementById('adminChatInput');
            if(!input.value.trim()) return;
            push(ref(db, 'chats/' + activeAdminChat), { text: input.value, sender: 'a', timestamp: Date.now() });
            input.value = '';
        };

        // Services
        const services = [
            { n: "15 min private cam 1 to 1", p: 200, i: 'video' },
            { n: "30 min private cam 1 to 1", p: 300, i: 'video' },
            { n: "1 hour private 1 to 1", p: 500, i: 'video' },
            { n: "30 min voice call", p: 200, i: 'phone' },
            { n: "1 hour private chat", p: 200, i: 'message-circle' }
        ];

        const sList = document.getElementById('servicesList');
        services.forEach(s => {
            const div = document.createElement('div');
            div.className = "glass p-5 rounded-[1.8rem] flex justify-between items-center cursor-pointer active:scale-95";
            div.onclick = () => {
                document.getElementById('bookName').innerText = s.n;
                document.getElementById('bookPrice').innerText = '₹' + s.p;
                showView('booking');
            };
            div.innerHTML = `<div class="flex items-center gap-4"><div class="w-10 h-10 bg-white/5 rounded-xl flex items-center justify-center"><i data-lucide="${s.i}" class="w-5 h-5 text-gray-400"></i></div><div><p class="text-[11px] font-black uppercase">${s.n}</p><p class="text-lg font-black text-purple-500 italic">₹${s.p}</p></div></div><button class="bg-purple-600/20 px-4 py-2 rounded-xl text-[9px] font-black uppercase text-purple-400">Select</button>`;
            sList.appendChild(div);
        });

        lucide.createIcons();
    </script>

</html>
</body>
